<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEEE EMBS Board Members 2025-26</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.0.0/dist/framer-motion.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;
    const { motion, useMotionValue, useSpring, useTransform } = Motion;

    const boardMembers = [
      { name: "Ishita Mohanta", role: "Chairperson" },
      { name: "Bhadra Sanjay Namboodiry", role: "Vice-Chairperson" },
      { name: "Tanisha Choudhuri", role: "Secretary" },
      { name: "S Hashmitha", role: "Co-Secretary" },
      { name: "A Nethraa", role: "Finance Head" },
      { name: "P Daphne Christina Ruby", role: "Research Head" },
      { name: "Prithiksha Suresh Kumar", role: "Design Head" },
      { name: "Haripriya Muni", role: "Public Relations Head" },
      { name: "Aryabrata Pattnaik", role: "Editorial Head" },
      { name: "Pooja Priyadarshini", role: "HR Head" },
    ];

    function IEEEEMBSLogo({ className, style }) {
      return (
        <img 
          src="assets/embs-logo-transparent.png" 
          alt="IEEE EMBS Logo"
          className={className}
          style={{ objectFit: 'contain', objectPosition: 'center', aspectRatio: 'auto', ...style }}
        />
      );
    }

    function Avatar({ name, className }) {
      const initials = name.split(" ").map(n => n[0]).join("");
      return (
        <div
          className={`${className} rounded-full flex items-center justify-center`}
          style={{
            background: "linear-gradient(145deg, #050505 0%, #10171a 55%, #160812 100%)",
            border: "2px solid rgba(69, 190, 214, 0.65)",
            boxShadow: "0 0 22px rgba(216, 88, 151, 0.28)",
          }}
        >
          <span className="font-mono text-sm" style={{ color: "#45bed6" }}>{initials}</span>
        </div>
      );
    }

    function LiquidMetalIDCard({ name = "Name", role = "Role" }) {
      const cardRef = useRef(null);
      const [isHovered, setIsHovered] = useState(false);
      const [isFlipped, setIsFlipped] = useState(false);
      const audioContextRef = useRef(null);

      const playFlipSound = useCallback(() => {
        if (!audioContextRef.current) {
          audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx = audioContextRef.current;
        if (!ctx) return;
        if (ctx.state === "suspended") ctx.resume();

        const duration = 0.4;
        const bufferSize = ctx.sampleRate * duration;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const output = noiseBuffer.getChannelData(0);

        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }

        const whiteNoise = ctx.createBufferSource();
        whiteNoise.buffer = noiseBuffer;

        const bandpass = ctx.createBiquadFilter();
        bandpass.type = "bandpass";
        bandpass.Q.value = 0.8;
        bandpass.frequency.setValueAtTime(200, ctx.currentTime);
        bandpass.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + duration * 0.3);
        bandpass.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + duration);

        const lowpass = ctx.createBiquadFilter();
        lowpass.type = "lowpass";
        lowpass.frequency.setValueAtTime(2000, ctx.currentTime);
        lowpass.frequency.exponentialRampToValueAtTime(4000, ctx.currentTime + duration * 0.4);
        lowpass.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + duration);

        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
        gainNode.gain.linearRampToValueAtTime(0.35, ctx.currentTime + duration * 0.3);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

        whiteNoise.connect(bandpass);
        bandpass.connect(lowpass);
        lowpass.connect(gainNode);
        gainNode.connect(ctx.destination);

        whiteNoise.start(ctx.currentTime);
        whiteNoise.stop(ctx.currentTime + duration);
      }, []);

      const mouseX = useMotionValue(0);
      const mouseY = useMotionValue(0);

      const rotateX = useSpring(useTransform(mouseY, [-0.5, 0.5], [12, -12]), { stiffness: 200, damping: 25 });
      const rotateY = useSpring(useTransform(mouseX, [-0.5, 0.5], [-12, 12]), { stiffness: 200, damping: 25 });

      const handleMouseMove = useCallback((e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        mouseX.set(x);
        mouseY.set(y);
      }, [mouseX, mouseY]);

      const handleMouseLeave = useCallback(() => {
        mouseX.set(0);
        mouseY.set(0);
        setIsHovered(false);
      }, [mouseX, mouseY]);

      const handleClick = () => {
        playFlipSound();
        setIsFlipped((current) => !current);
        mouseX.set(0);
        mouseY.set(0);
      };

      return (
        <div className="relative" style={{ perspective: "1500px" }}>
          <motion.div
            ref={cardRef}
            onMouseMove={handleMouseMove}
            onMouseEnter={() => setIsHovered(true)}
            onMouseLeave={handleMouseLeave}
            onClick={handleClick}
            animate={{
              scale: isFlipped ? [1, 1.05, 1] : 1,
            }}
            style={{
              rotateX: isFlipped ? 0 : rotateX,
              rotateY: isFlipped ? 180 : rotateY,
              transformStyle: "preserve-3d",
              width: "min(440px, calc(100vw - 48px))",
              height: "272px",
            }}
            transition={{
              rotateY: { duration: 0.8, ease: [0.4, 0, 0.2, 1] },
              scale: { duration: 0.8, ease: [0.4, 0, 0.2, 1], times: [0, 0.5, 1] },
            }}
            className="relative cursor-pointer"
          >
            <motion.div
              className="absolute inset-0 rounded-2xl overflow-hidden"
              style={{ backfaceVisibility: "hidden" }}
              animate={{
                opacity: isFlipped ? 0 : 1,
                filter: isFlipped ? "blur(8px)" : "blur(0px)",
              }}
              transition={{ duration: 0.4, ease: "easeInOut" }}
            >
              <div
                className="absolute inset-0"
                style={{
                  background: "linear-gradient(135deg, #020404 0%, #06171c 28%, #050506 52%, #190817 74%, #020404 100%)",
                }}
              />

              <motion.div
                className="absolute inset-0"
                animate={{
                  backgroundPosition: isHovered ? ["0% 0%", "100% 100%", "0% 0%"] : ["0% 0%", "50% 50%", "0% 0%"],
                }}
                transition={{
                  duration: isHovered ? 4 : 8,
                  repeat: Infinity,
                  ease: "easeInOut",
                }}
                style={{
                  background: `
                    radial-gradient(ellipse 80% 50% at 20% 30%, rgba(69,190,214,0.18) 0%, transparent 52%),
                    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(216,88,151,0.2) 0%, transparent 52%),
                    radial-gradient(ellipse 100% 60% at 50% 50%, rgba(255,255,255,0.035) 0%, transparent 60%)
                  `,
                  backgroundSize: "200% 200%",
                }}
              />

              <motion.div
                className="absolute inset-0 opacity-60"
                animate={{
                  background: isHovered
                    ? [
                        "linear-gradient(45deg, transparent 30%, rgba(69,190,214,0.2) 50%, transparent 70%)",
                        "linear-gradient(45deg, transparent 40%, rgba(216,88,151,0.24) 55%, transparent 75%)",
                        "linear-gradient(45deg, transparent 30%, rgba(69,190,214,0.2) 50%, transparent 70%)",
                      ]
                    : "linear-gradient(45deg, transparent 30%, rgba(69,190,214,0.12) 50%, transparent 70%)",
                }}
                transition={{ duration: 3, repeat: Infinity, ease: "easeInOut" }}
              />

              <motion.div
                className="absolute inset-0"
                animate={{ opacity: isHovered ? [0.3, 0.6, 0.3] : 0.3 }}
                transition={{ duration: 2, repeat: Infinity, ease: "easeInOut" }}
                style={{
                  background: `
                    conic-gradient(from 0deg at 30% 30%, 
                      transparent 0deg, 
                      rgba(69,190,214,0.18) 60deg, 
                      transparent 120deg,
                      rgba(216,88,151,0.14) 180deg,
                      transparent 240deg,
                      rgba(69,190,214,0.14) 300deg,
                      transparent 360deg
                    )
                  `,
                }}
              />

              <motion.div className="absolute inset-0 overflow-hidden rounded-2xl">
                <motion.div
                  className="absolute h-full"
                  animate={{ x: ["-200%", "100%"] }}
                  transition={{
                    duration: 5,
                    repeat: Infinity,
                    ease: "easeInOut",
                    repeatDelay: 2,
                  }}
                  style={{
                    background: "linear-gradient(90deg, transparent 0%, transparent 40%, rgba(69,190,214,0.16) 48%, rgba(216,88,151,0.12) 54%, transparent 62%, transparent 100%)",
                    transform: "skewX(-25deg)",
                    width: "300%",
                  }}
                />
              </motion.div>

              <div
                className="absolute rounded-2xl"
                style={{
                  inset: "1px",
                  border: "1px solid rgba(69,190,214,0.25)",
                  boxShadow: "inset 0 1px 1px rgba(69,190,214,0.22), inset 0 -1px 1px rgba(216,88,151,0.16), 0 18px 46px rgba(216,88,151,0.12)",
                }}
              />

              <div className="relative h-full p-8 flex flex-col justify-between gap-5" style={{ transform: "translateZ(30px)" }}>
                <div className="grid items-center gap-6" style={{ gridTemplateColumns: "112px minmax(0, 1fr)", minHeight: "150px" }}>
                  <div className="relative">
                    <motion.div
                      className="absolute rounded-full"
                      animate={{ opacity: isHovered ? [0.4, 0.8, 0.4] : 0.4 }}
                      transition={{ duration: 2, repeat: Infinity, ease: "easeInOut" }}
                      style={{
                        background: "linear-gradient(135deg, #45bed6 0%, #d85897 55%, #45bed6 100%)",
                        inset: "-3px",
                        borderRadius: "9999px",
                      }}
                    />
                    <Avatar name={name} className="relative w-28 h-28" />
                  </div>

                  <div className="min-w-0">
                    <div className="space-y-2 text-right">
                      <motion.h2
                        className="text-xl sm:text-2xl font-light tracking-wide text-white leading-tight break-words"
                        style={{ textShadow: "0 2px 12px rgba(69,190,214,0.24)" }}
                      >
                        {name}
                      </motion.h2>
                      <p
                        className="text-xs tracking-widest uppercase"
                        style={{
                          background: "linear-gradient(90deg, #45bed6 0%, #f0c4da 50%, #d85897 100%)",
                          WebkitBackgroundClip: "text",
                          WebkitTextFillColor: "transparent",
                        }}
                      >
                        {role}
                      </p>
                    </div>
                  </div>
                </div>

                <div className="flex items-end justify-between">
                  <div></div>
                  <motion.div
                    className="flex items-center justify-center"
                    animate={{ opacity: isHovered ? 1 : 0.7 }}
                    transition={{ duration: 0.3 }}
                  >
                    <IEEEEMBSLogo className="h-12" style={{ width: "145px", borderRadius: "6px" }} />
                  </motion.div>
                </div>
              </div>

              <motion.div
                className="absolute left-1/2"
                style={{ bottom: "12px", transform: "translateX(-50%)" }}
                initial={{ opacity: 0 }}
                animate={{ opacity: isHovered ? 0.5 : 0 }}
                transition={{ duration: 0.3 }}
              >
                <span className="uppercase" style={{ color: "#45bed6", fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                  Click to flip
                </span>
              </motion.div>
            </motion.div>

            <motion.div
              className="absolute inset-0 rounded-2xl overflow-hidden"
              style={{
                backfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
              }}
              animate={{
                opacity: isFlipped ? 1 : 0,
                filter: isFlipped ? "blur(0px)" : "blur(8px)",
              }}
              transition={{ duration: 0.4, ease: "easeInOut" }}
            >
              <div
                className="absolute inset-0"
                style={{
                  background: "linear-gradient(225deg, #06171c 0%, #120713 34%, #020404 62%, #0b1d22 100%)",
                }}
              />

              <motion.div
                className="absolute inset-0"
                animate={{ backgroundPosition: ["0% 0%", "100% 100%", "0% 0%"] }}
                transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                style={{
                  background: `
                    radial-gradient(ellipse 60% 40% at 70% 40%, rgba(216,88,151,0.18) 0%, transparent 50%),
                    radial-gradient(ellipse 80% 60% at 30% 60%, rgba(69,190,214,0.16) 0%, transparent 50%)
                  `,
                  backgroundSize: "200% 200%",
                }}
              />

              <div
                className="absolute rounded-2xl"
                style={{
                  inset: "1px",
                  border: "1px solid rgba(216,88,151,0.28)",
                  boxShadow: "inset 0 1px 1px rgba(216,88,151,0.2), inset 0 -1px 1px rgba(69,190,214,0.16)",
                }}
              />

              <div className="relative h-full p-8 flex flex-col justify-between">
                <div className="flex items-center justify-between gap-4">
                  <IEEEEMBSLogo className="h-8 opacity-80" style={{ width: "96px", borderRadius: "4px" }} />
                  <span className="uppercase" style={{ color: "#d85897", fontSize: "11px", fontFamily: "monospace", letterSpacing: "0.22em" }}>
                    IEEE EMBS BOARD
                  </span>
                </div>

                <div className="space-y-4">
                  <div className="space-y-1">
                    <h3 className="text-2xl font-light leading-tight text-white">{name}</h3>
                    <p
                      className="text-xs tracking-widest uppercase"
                      style={{
                        background: "linear-gradient(90deg, #45bed6 0%, #f0c4da 50%, #d85897 100%)",
                        WebkitBackgroundClip: "text",
                        WebkitTextFillColor: "transparent",
                      }}
                    >
                      {role}
                    </p>
                  </div>

                  <div className="space-y-2">
                    <h3 className="uppercase" style={{ color: "#45bed6", fontSize: "10px", fontFamily: "monospace", letterSpacing: "0.2em" }}>
                      About
                    </h3>
                    <p className="text-sm leading-relaxed" style={{ color: "#c9dce1" }}>
                      A dedicated member of the IEEE EMBS board, contributing to the chapter's work in biomedical engineering, healthcare technology, research, and student-led innovation.
                    </p>
                  </div>
                </div>

                <div className="flex items-center justify-between">
                  <span></span>
                  <span style={{ color: "#45bed6", fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.05em" }}>
                    2025-26
                  </span>
                </div>

                <motion.div
                  className="absolute left-1/2"
                  style={{ bottom: "12px", transform: "translateX(-50%)" }}
                  initial={{ opacity: 0.5 }}
                  animate={{ opacity: 0.5 }}
                >
                  <span className="uppercase" style={{ color: "#d85897", fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                    Click to flip back
                  </span>
                </motion.div>
              </div>
            </motion.div>
          </motion.div>
        </div>
      );
    }

    function App() {
      return (
        <main className="min-h-screen bg-black py-16 px-8">
          <div
            className="fixed inset-0 opacity-20 pointer-events-none"
            style={{
              background: "radial-gradient(ellipse at 42% 36%, rgba(69, 190, 214, 0.12) 0%, transparent 48%), radial-gradient(ellipse at 68% 72%, rgba(216, 88, 151, 0.12) 0%, transparent 52%)",
            }}
          />

          <div className="relative z-10 text-center mb-16">
            <h1 className="text-4xl font-light tracking-wide text-white mb-2" style={{ textShadow: "0 0 24px rgba(69,190,214,0.28)" }}>IEEE EMBS</h1>
            <p
              className="text-sm uppercase"
              style={{
                letterSpacing: "0.3em",
                background: "linear-gradient(90deg, #45bed6 0%, #f0c4da 45%, #d85897 100%)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
              }}
            >
              Board Members 2025-26
            </p>
          </div>

          <div
            className="relative z-10 grid gap-12 mx-auto justify-items-center"
            style={{
              gridTemplateColumns: "repeat(auto-fit, minmax(min(100%, 440px), 1fr))",
              maxWidth: "960px",
            }}
          >
            {boardMembers.map((member, index) => (
              <LiquidMetalIDCard key={index} name={member.name} role={member.role} />
            ))}
          </div>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
