<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEEE EMBS Board Members 2025-26</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.0.0/dist/framer-motion.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;
    const { motion, useMotionValue, useSpring, useTransform } = Motion;

    const boardMembers = [
      { name: "Ishita Mohanta", role: "Chairperson" },
      { name: "Bhadra Sanjay Namboodiry", role: "Vice-Chairperson" },
      { name: "Tanisha Choudhuri", role: "Secretary" },
      { name: "S Hashmitha", role: "Co-Secretary" },
      { name: "A Nethraa", role: "Finance Head" },
      { name: "P Daphne Christina Ruby", role: "Research Head" },
      { name: "Prithiksha Suresh Kumar", role: "Design Head" },
      { name: "Haripriya Muni", role: "Public Relations Head" },
      { name: "Aryabrata Pattnaik", role: "Editorial Head" },
      { name: "Pooja Priyadarshini", role: "HR Head" },
    ];

    function IEEEEMBSLogo({ className }) {
      return (
        <img 
          src="https://www.embs.org/wp-content/uploads/2024/06/ieee-embs-tag-tm-ko-logo2x.png" 
          alt="IEEE EMBS Logo"
          className={className}
          style={{ objectFit: 'contain', aspectRatio: 'auto' }}
        />
      );
    }

    function Avatar({ name, className }) {
      const initials = name.split(" ").map(n => n[0]).join("");
      return (
        <div className={`${className} rounded-full bg-neutral-900 border-2 border-neutral-700 flex items-center justify-center`}>
          <span className="text-white font-mono text-sm">{initials}</span>
        </div>
      );
    }

    function LiquidMetalIDCard({ name = "Name", role = "Role" }) {
      const cardRef = useRef(null);
      const [isHovered, setIsHovered] = useState(false);
      const [isFlipped, setIsFlipped] = useState(false);
      const audioContextRef = useRef(null);

      useEffect(() => {
        audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        return () => audioContextRef.current?.close();
      }, []);

      const playFlipSound = useCallback(() => {
        const ctx = audioContextRef.current;
        if (!ctx) return;
        if (ctx.state === "suspended") ctx.resume();

        const duration = 0.4;
        const bufferSize = ctx.sampleRate * duration;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const output = noiseBuffer.getChannelData(0);

        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }

        const whiteNoise = ctx.createBufferSource();
        whiteNoise.buffer = noiseBuffer;

        const bandpass = ctx.createBiquadFilter();
        bandpass.type = "bandpass";
        bandpass.Q.value = 0.8;
        bandpass.frequency.setValueAtTime(200, ctx.currentTime);
        bandpass.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + duration * 0.3);
        bandpass.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + duration);

        const lowpass = ctx.createBiquadFilter();
        lowpass.type = "lowpass";
        lowpass.frequency.setValueAtTime(2000, ctx.currentTime);
        lowpass.frequency.exponentialRampToValueAtTime(4000, ctx.currentTime + duration * 0.4);
        lowpass.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + duration);

        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
        gainNode.gain.linearRampToValueAtTime(0.35, ctx.currentTime + duration * 0.3);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

        whiteNoise.connect(bandpass);
        bandpass.connect(lowpass);
        lowpass.connect(gainNode);
        gainNode.connect(ctx.destination);

        whiteNoise.start(ctx.currentTime);
        whiteNoise.stop(ctx.currentTime + duration);
      }, []);

      const mouseX = useMotionValue(0);
      const mouseY = useMotionValue(0);

      const rotateX = useSpring(useTransform(mouseY, [-0.5, 0.5], [12, -12]), { stiffness: 200, damping: 25 });
      const rotateY = useSpring(useTransform(mouseX, [-0.5, 0.5], [-12, 12]), { stiffness: 200, damping: 25 });

      const handleMouseMove = useCallback((e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        mouseX.set(x);
        mouseY.set(y);
      }, [mouseX, mouseY]);

      const handleMouseLeave = useCallback(() => {
        mouseX.set(0);
        mouseY.set(0);
        setIsHovered(false);
      }, [mouseX, mouseY]);

      const handleClick = () => {
        playFlipSound();
        setIsFlipped(!isFlipped);
        mouseX.set(0);
        mouseY.set(0);
      };

      return (
        <div className="relative" style={{ perspective: "1500px" }}>
          <motion.div
            ref={cardRef}
            onMouseMove={handleMouseMove}
            onMouseEnter={() => setIsHovered(true)}
            onMouseLeave={handleMouseLeave}
            onClick={handleClick}
            animate={{
              rotateY: isFlipped ? 180 : 0,
              scale: isFlipped ? [1, 1.05, 1] : 1,
            }}
            style={{
              rotateX: rotateX,
              rotateY: isFlipped ? 180 : rotateY,
              transformStyle: "preserve-3d",
            }}
            transition={{
              rotateY: { duration: 0.8, ease: [0.4, 0, 0.2, 1] },
              scale: { duration: 0.8, ease: [0.4, 0, 0.2, 1], times: [0, 0.5, 1] },
            }}
            className="relative cursor-pointer"
            style={{ width: "420px", height: "260px", transformStyle: "preserve-3d" }}
          >
            <motion.div
              className="absolute inset-0 rounded-2xl overflow-hidden"
              style={{ backfaceVisibility: "hidden" }}
              animate={{
                opacity: isFlipped ? 0 : 1,
                filter: isFlipped ? "blur(8px)" : "blur(0px)",
              }}
              transition={{ duration: 0.4, ease: "easeInOut" }}
            >
              <div
                className="absolute inset-0"
                style={{
                  background: "linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 25%, #0f0f0f 50%, #1f1f1f 75%, #0a0a0a 100%)",
                }}
              />

              <motion.div
                className="absolute inset-0"
                animate={{
                  backgroundPosition: isHovered ? ["0% 0%", "100% 100%", "0% 0%"] : ["0% 0%", "50% 50%", "0% 0%"],
                }}
                transition={{
                  duration: isHovered ? 4 : 8,
                  repeat: Infinity,
                  ease: "easeInOut",
                }}
                style={{
                  background: `
                    radial-gradient(ellipse 80% 50% at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(255,255,255,0.06) 0%, transparent 50%),
                    radial-gradient(ellipse 100% 60% at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 60%)
                  `,
                  backgroundSize: "200% 200%",
                }}
              />

              <motion.div
                className="absolute inset-0 opacity-60"
                animate={{
                  background: isHovered
                    ? [
                        "linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%)",
                        "linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 55%, transparent 75%)",
                        "linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%)",
                      ]
                    : "linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%)",
                }}
                transition={{ duration: 3, repeat: Infinity, ease: "easeInOut" }}
              />

              <motion.div
                className="absolute inset-0"
                animate={{ opacity: isHovered ? [0.3, 0.6, 0.3] : 0.3 }}
                transition={{ duration: 2, repeat: Infinity, ease: "easeInOut" }}
                style={{
                  background: `
                    conic-gradient(from 0deg at 30% 30%, 
                      transparent 0deg, 
                      rgba(255,255,255,0.1) 60deg, 
                      transparent 120deg,
                      rgba(255,255,255,0.05) 180deg,
                      transparent 240deg,
                      rgba(255,255,255,0.08) 300deg,
                      transparent 360deg
                    )
                  `,
                }}
              />

              <motion.div className="absolute inset-0 overflow-hidden rounded-2xl">
                <motion.div
                  className="absolute h-full"
                  style={{ width: "300%" }}
                  animate={{ x: ["-200%", "100%"] }}
                  transition={{
                    duration: 5,
                    repeat: Infinity,
                    ease: "easeInOut",
                    repeatDelay: 2,
                  }}
                  style={{
                    background: "linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%, transparent 100%)",
                    transform: "skewX(-25deg)",
                    width: "300%",
                  }}
                />
              </motion.div>

              <div
                className="absolute rounded-2xl"
                style={{
                  inset: "1px",
                  border: "1px solid rgba(255,255,255,0.08)",
                  boxShadow: "inset 0 1px 1px rgba(255,255,255,0.1), inset 0 -1px 1px rgba(0,0,0,0.3)",
                }}
              />

              <div className="relative h-full p-8 flex flex-col justify-between" style={{ transform: "translateZ(30px)" }}>
                <div className="flex items-center justify-between">
                  <div className="relative">
                    <motion.div
                      className="absolute rounded-full"
                      style={{ inset: "-3px" }}
                      animate={{ opacity: isHovered ? [0.4, 0.8, 0.4] : 0.4 }}
                      transition={{ duration: 2, repeat: Infinity, ease: "easeInOut" }}
                      style={{
                        background: "linear-gradient(135deg, #fff 0%, #833 50%, #fff 100%)",
                        inset: "-3px",
                        borderRadius: "9999px",
                      }}
                    />
                    <Avatar name={name} className="relative w-16 h-16" />
                  </div>

                  <div className="flex items-center gap-2">
                    <div className="space-y-2 text-right">
                      <motion.h2
                        className="text-2xl font-light tracking-wide text-white"
                        style={{ textShadow: "0 2px 10px rgba(255,255,255,0.1)" }}
                      >
                        {name}
                      </motion.h2>
                      <p
                        className="text-xs tracking-widest uppercase"
                        style={{
                          background: "linear-gradient(90deg, #888 0%, #fff 50%, #888 100%)",
                          WebkitBackgroundClip: "text",
                          WebkitTextFillColor: "transparent",
                        }}
                      >
                        {role}
                      </p>
                    </div>
                  </div>
                </div>

                <div className="flex items-end justify-between">
                  <div></div>
                  <motion.div
                    className="flex items-center justify-center"
                    animate={{ opacity: isHovered ? 1 : 0.7 }}
                    transition={{ duration: 0.3 }}
                  >
                    <IEEEEMBSLogo className="h-10" style={{ maxWidth: "120px" }} />
                  </motion.div>
                </div>
              </div>

              <motion.div
                className="absolute left-1/2"
                style={{ bottom: "12px", transform: "translateX(-50%)" }}
                initial={{ opacity: 0 }}
                animate={{ opacity: isHovered ? 0.5 : 0 }}
                transition={{ duration: 0.3 }}
              >
                <span className="text-neutral-500 uppercase" style={{ fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                  Click to flip
                </span>
              </motion.div>
            </motion.div>

            <motion.div
              className="absolute inset-0 rounded-2xl overflow-hidden"
              style={{
                backfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
              }}
              animate={{
                opacity: isFlipped ? 1 : 0,
                filter: isFlipped ? "blur(0px)" : "blur(8px)",
              }}
              transition={{ duration: 0.4, ease: "easeInOut" }}
            >
              <div
                className="absolute inset-0"
                style={{
                  background: "linear-gradient(225deg, #0f0f0f 0%, #1a1a1a 30%, #0a0a0a 60%, #151515 100%)",
                }}
              />

              <motion.div
                className="absolute inset-0"
                animate={{ backgroundPosition: ["0% 0%", "100% 100%", "0% 0%"] }}
                transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                style={{
                  background: `
                    radial-gradient(ellipse 60% 40% at 70% 40%, rgba(255,255,255,0.06) 0%, transparent 50%),
                    radial-gradient(ellipse 80% 60% at 30% 60%, rgba(255,255,255,0.04) 0%, transparent 50%)
                  `,
                  backgroundSize: "200% 200%",
                }}
              />

              <div
                className="absolute rounded-2xl"
                style={{
                  inset: "1px",
                  border: "1px solid rgba(255,255,255,0.08)",
                  boxShadow: "inset 0 1px 1px rgba(255,255,255,0.1), inset 0 -1px 1px rgba(0,0,0,0.3)",
                }}
              />

              <div className="relative h-full p-8 flex flex-col justify-between">
                <div className="flex items-center justify-between">
                  <IEEEEMBSLogo className="h-6 opacity-50" style={{ maxWidth: "80px" }} />
                  <span className="text-neutral-600 uppercase" style={{ fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.3em" }}>
                    IEEE EMBS BOARD
                  </span>
                </div>

                <div className="space-y-6">
                  <div className="space-y-2">
                    <h3 className="text-neutral-500 uppercase" style={{ fontSize: "10px", fontFamily: "monospace", letterSpacing: "0.2em" }}>
                      About
                    </h3>
                    <p className="text-sm text-neutral-400 leading-relaxed">
                      Building the future of biomedical engineering. Dedicated to advancing healthcare technology and innovation.
                    </p>
                  </div>

                  <div className="space-y-2">
                    <h3 className="text-neutral-500 uppercase" style={{ fontSize: "10px", fontFamily: "monospace", letterSpacing: "0.2em" }}>
                      Focus Areas
                    </h3>
                    <div className="flex flex-wrap gap-2">
                      {["BioMed", "Healthcare", "Innovation", "Research"].map((skill) => (
                        <span
                          key={skill}
                          className="px-3 py-1 text-neutral-300 rounded-full"
                          style={{
                            fontSize: "10px",
                            fontFamily: "monospace",
                            letterSpacing: "0.05em",
                            background: "rgba(255,255,255,0.05)",
                            border: "1px solid rgba(255,255,255,0.1)",
                          }}
                        >
                          {skill}
                        </span>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="flex items-center justify-between">
                  <span></span>
                  <span className="text-neutral-600" style={{ fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.05em" }}>
                    2025-26
                  </span>
                </div>

                <motion.div
                  className="absolute left-1/2"
                  style={{ bottom: "12px", transform: "translateX(-50%)" }}
                  initial={{ opacity: 0.5 }}
                  animate={{ opacity: 0.5 }}
                >
                  <span className="text-neutral-500 uppercase" style={{ fontSize: "9px", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                    Click to flip back
                  </span>
                </motion.div>
              </div>
            </motion.div>
          </motion.div>
        </div>
      );
    }

    function App() {
      return (
        <main className="min-h-screen bg-black py-16 px-8">
          <div
            className="fixed inset-0 opacity-20 pointer-events-none"
            style={{
              background: "radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 70%)",
            }}
          />

          <div className="relative z-10 text-center mb-16">
            <h1 className="text-4xl font-light tracking-wide text-white mb-2">IEEE EMBS</h1>
            <p
              className="text-sm uppercase"
              style={{
                letterSpacing: "0.3em",
                background: "linear-gradient(90deg, #888 0%, #fff 50%, #888 100%)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
              }}
            >
              Board Members 2025-26
            </p>
          </div>

          <div
            className="relative z-10 grid gap-12 mx-auto justify-items-center"
            style={{
              gridTemplateColumns: "repeat(auto-fit, minmax(420px, 1fr))",
              maxWidth: "920px",
            }}
          >
            {boardMembers.map((member, index) => (
              <LiquidMetalIDCard key={index} name={member.name} role={member.role} />
            ))}
          </div>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

```
